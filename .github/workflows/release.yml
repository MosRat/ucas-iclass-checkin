name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

jobs:
  desktop-release:
    name: desktop-${{ matrix.platform }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/app-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact_name: desktop-linux-bundles
          - platform: windows-latest
            artifact_name: desktop-windows-bundles
          - platform: macos-latest
            artifact_name: desktop-macos-bundles
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/iclass-gui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install linux gui dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        working-directory: apps/iclass-gui
        run: pnpm install --frozen-lockfile

      - name: build desktop bundle
        working-directory: apps/iclass-gui
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.platform == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
          RUSTFLAGS: ""
        run: pnpm tauri build

      - name: upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/bundle/**/*
          if-no-files-found: error

  android-release:
    name: android-release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/app-v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/iclass-gui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: install tauri cli
        run: cargo install tauri-cli --locked --version 2.10.1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: install frontend dependencies
        working-directory: apps/iclass-gui
        run: pnpm install --frozen-lockfile

      - name: restore android signing materials
        working-directory: apps/iclass-gui/src-tauri/gen/android
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > iclass-release.jks
          cat > keystore.properties <<'EOF'
          storeFile=iclass-release.jks
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EOF

      - name: build android artifacts
        working-directory: apps/iclass-gui
        run: pnpm tauri android build --apk --aab

      - name: upload android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: |
            apps/iclass-gui/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            apps/iclass-gui/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error

  publish-release:
    name: publish-release
    if: startsWith(github.ref, 'refs/tags/app-v')
    needs:
      - desktop-release
      - android-release
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: download desktop linux bundles
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux-bundles
          path: release-assets/linux

      - name: download desktop windows bundles
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-bundles
          path: release-assets/windows

      - name: download desktop macos bundles
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos-bundles
          path: release-assets/macos

      - name: download android bundles
        uses: actions/download-artifact@v4
        with:
          name: android-release-artifacts
          path: release-assets/android

      - name: attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release-assets/linux/**/*
            release-assets/windows/**/*
            release-assets/macos/**/*
            release-assets/android/**/*
