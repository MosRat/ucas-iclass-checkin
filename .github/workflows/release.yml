name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

jobs:
  desktop-release:
    name: desktop-${{ matrix.platform }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/app-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact_name: desktop-linux-bundles
          - platform: windows-latest
            artifact_name: desktop-windows-bundles
          - platform: macos-latest
            artifact_name: desktop-macos-bundles
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/iclass-gui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: install linux gui dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        working-directory: apps/iclass-gui
        run: pnpm install --frozen-lockfile

      - name: build desktop bundle
        working-directory: apps/iclass-gui
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.platform == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
          RUSTFLAGS: ""
        run: pnpm tauri build

      - name: stage desktop installers
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#app-v}"
          if [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' apps/iclass-gui/package.json | head -n1)"
          fi
          stage="release-staging/desktop"
          mkdir -p "$stage"
          case "${{ matrix.platform }}" in
            ubuntu-22.04)
              cp target/release/bundle/appimage/*.AppImage "$stage/ucas-iclass-checkin_${version}_linux_x86_64.AppImage"
              cp target/release/bundle/deb/*.deb "$stage/ucas-iclass-checkin_${version}_linux_amd64.deb"
              cp target/release/bundle/rpm/*.rpm "$stage/ucas-iclass-checkin_${version}_linux_x86_64.rpm"
              ;;
            windows-latest)
              cp target/release/bundle/nsis/*-setup.exe "$stage/ucas-iclass-checkin_${version}_windows_x64-setup.exe"
              cp target/release/bundle/msi/*.msi "$stage/ucas-iclass-checkin_${version}_windows_x64.msi"
              ;;
            macos-latest)
              cp target/release/bundle/dmg/*.dmg "$stage/ucas-iclass-checkin_${version}_macos_aarch64.dmg"
              ;;
          esac

      - name: upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release-staging/desktop/*
          if-no-files-found: error

  cli-release:
    name: cli-${{ matrix.platform }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/app-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact_name: cli-linux-musl
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - platform: windows-latest
            artifact_name: cli-windows
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - platform: macos-latest
            artifact_name: cli-macos
            target: aarch64-apple-darwin
            archive_ext: tar.gz
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: mlugg/setup-zig@v2
        if: matrix.platform == 'ubuntu-22.04'

      - name: install cargo-zigbuild
        if: matrix.platform == 'ubuntu-22.04'
        run: cargo install cargo-zigbuild --locked

      - name: build linux musl cli
        if: matrix.platform == 'ubuntu-22.04'
        run: cargo zigbuild --release --package iclass-cli --target ${{ matrix.target }}

      - name: build native cli
        if: matrix.platform != 'ubuntu-22.04'
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.platform == 'windows-latest' && '-C target-feature=+crt-static' || '' }}
        run: cargo build --release --package iclass-cli --target ${{ matrix.target }}

      - name: stage cli binary
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#app-v}"
          if [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' apps/iclass-gui/package.json | head -n1)"
          fi
          stage="release-staging/cli"
          mkdir -p "$stage/package"
          case "${{ matrix.platform }}" in
            ubuntu-22.04)
              platform_name="linux_x86_64-musl"
              binary="target/${{ matrix.target }}/release/iclass-cli"
              cp "$binary" "$stage/package/iclass-cli"
              ;;
            windows-latest)
              platform_name="windows_x64"
              binary="target/${{ matrix.target }}/release/iclass-cli.exe"
              cp "$binary" "$stage/package/iclass-cli.exe"
              ;;
            macos-latest)
              platform_name="macos_aarch64"
              binary="target/${{ matrix.target }}/release/iclass-cli"
              cp "$binary" "$stage/package/iclass-cli"
              ;;
          esac
          cp README.md LICENSE "$stage/package/"
          archive_base="ucas-iclass-cli_${version}_${platform_name}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (cd "$stage/package" && 7z a "../${archive_base}.zip" .)
          else
            tar -czf "$stage/${archive_base}.tar.gz" -C "$stage/package" .
          fi

      - name: upload cli bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release-staging/cli/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  android-release:
    name: android-release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/app-v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/iclass-gui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: install tauri cli
        run: cargo install tauri-cli --locked --version 2.10.1

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4

      - name: install frontend dependencies
        working-directory: apps/iclass-gui
        run: pnpm install --frozen-lockfile

      - name: restore android signing materials
        working-directory: apps/iclass-gui/src-tauri/gen/android
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/iclass-release.jks
          printf 'storeFile=%s\n' "${PWD}/app/iclass-release.jks" > keystore.properties
          printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS" >> keystore.properties
          printf 'password=%s\n' "$ANDROID_KEYSTORE_PASSWORD" >> keystore.properties

      - name: build android artifacts
        working-directory: apps/iclass-gui
        run: pnpm tauri android build --apk --aab

      - name: stage android artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#app-v}"
          if [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' apps/iclass-gui/package.json | head -n1)"
          fi
          stage="release-staging/android"
          mkdir -p "$stage"
          cp apps/iclass-gui/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk "$stage/ucas-iclass-checkin_${version}_android_universal.apk"
          cp apps/iclass-gui/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab "$stage/ucas-iclass-checkin_${version}_android_universal.aab"

      - name: upload android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release-artifacts
          path: release-staging/android/*
          if-no-files-found: error

  agent-skill-release:
    name: agent-skill-release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/app-v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: stage agent skill
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#app-v}"
          if [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="$(node -p "require('./apps/iclass-gui/package.json').version")"
          fi
          stage="release-staging/agent-skill"
          mkdir -p "$stage"
          (cd .agents/skills && zip -r "../../$stage/ucas-iclass-cli-skill_${version}.zip" iclass-cli)

      - name: upload agent skill
        uses: actions/upload-artifact@v7
        with:
          name: agent-skill
          path: release-staging/agent-skill/*.zip
          if-no-files-found: error

  publish-release:
    name: publish-release
    if: startsWith(github.ref, 'refs/tags/app-v')
    needs:
      - desktop-release
      - cli-release
      - android-release
      - agent-skill-release
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: download desktop linux bundles
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-bundles
          path: release-assets/linux

      - name: download desktop windows bundles
        uses: actions/download-artifact@v8
        with:
          name: desktop-windows-bundles
          path: release-assets/windows

      - name: download desktop macos bundles
        uses: actions/download-artifact@v8
        with:
          name: desktop-macos-bundles
          path: release-assets/macos

      - name: download android bundles
        uses: actions/download-artifact@v8
        with:
          name: android-release-artifacts
          path: release-assets/android

      - name: download cli linux bundle
        uses: actions/download-artifact@v8
        with:
          name: cli-linux-musl
          path: release-assets/cli

      - name: download cli windows bundle
        uses: actions/download-artifact@v8
        with:
          name: cli-windows
          path: release-assets/cli

      - name: download cli macos bundle
        uses: actions/download-artifact@v8
        with:
          name: cli-macos
          path: release-assets/cli

      - name: download agent skill bundle
        uses: actions/download-artifact@v8
        with:
          name: agent-skill
          path: release-assets/agent-skill

      - name: attach artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: release-assets/**/*
